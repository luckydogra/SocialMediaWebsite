<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Surbhi Saini – Social Media Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       ROOT DESIGN TOKENS — edit freely
    ============================================================ */
    :root {
      --bg:          #0a0a0a;
      --surface:     #111111;
      --surface2:    #1a1a1a;
      --border:      #2a2a2a;
      --accent:      #c9a96e;          /* warm gold — your signature colour */
      --accent2:     #e8c99a;
      --text:        #f0ede8;
      --text-muted:  #888880;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'DM Sans', sans-serif;
      --max-w:        430px;
      --radius:       4px;
      --story-size:   60px;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { background: var(--bg); }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       APP SHELL — phone-width container
    ============================================================ */
    #app {
      width: 100%;
      max-width: var(--max-w);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ============================================================
       TOP BAR
    ============================================================ */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
    }
    .topbar-name {
      font-family: var(--font-display);
      font-size: 1.25rem;
      letter-spacing: 0.02em;
      color: var(--text);
    }
    .topbar-name em { color: var(--accent); font-style: italic; }
    .topbar-icons { display: flex; gap: 18px; align-items: center; }
    .topbar-icons svg { width: 22px; height: 22px; stroke: var(--text); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: stroke 0.2s; }
    .topbar-icons svg:hover { stroke: var(--accent); }

    /* ============================================================
       PROFILE HEADER
    ============================================================ */
    .profile-header {
      padding: 22px 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .profile-top {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    /* Avatar ring */
    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .avatar-ring {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      padding: 3px;
      background: conic-gradient(from 180deg, #c9a96e, #e8c99a, #b8860b, #c9a96e);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid var(--bg);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
    }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-placeholder {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--accent);
      user-select: none;
    }

    /* Stats */
    .profile-stats {
      display: flex;
      gap: 22px;
      flex: 1;
      justify-content: space-around;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .stat-num {
      font-weight: 500;
      font-size: 1.1rem;
      color: var(--text);
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Bio */
    .profile-bio {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .bio-name {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .bio-role {
      font-size: 0.82rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .bio-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.55;
      margin-top: 2px;
      white-space: pre-line;
    }
    .bio-link {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.83rem;
      color: var(--accent);
      text-decoration: none;
      margin-top: 3px;
    }
    .bio-link:hover { color: var(--accent2); }
    .bio-link svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* Tags */
    .bio-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .bio-tag {
      font-size: 0.72rem;
      padding: 3px 9px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    /* Buttons */
    .profile-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 8px 0;
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      border: none;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: var(--accent2); }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon {
      flex: none;
      width: 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
      padding: 0;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-icon:hover { border-color: var(--accent); }
    .btn-icon svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 2; }

    /* ============================================================
       HIGHLIGHTS (Stories-style)
    ============================================================ */
    .highlights-section {
      padding: 8px 0 14px;
      border-bottom: 1px solid var(--border);
    }
    .highlights-scroll {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding: 4px 18px;
      scrollbar-width: none;
    }
    .highlights-scroll::-webkit-scrollbar { display: none; }
    .highlight-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .highlight-ring {
      width: var(--story-size);
      height: var(--story-size);
      border-radius: 50%;
      padding: 2px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s;
    }
    .highlight-item:hover .highlight-ring {
      background: conic-gradient(from 180deg, #c9a96e, #e8c99a, #c9a96e);
    }
    .highlight-icon-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--surface2);
      border: 3px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      overflow: hidden;
    }
    .highlight-icon-inner img { width: 100%; height: 100%; object-fit: cover; }
    .highlight-label {
      font-size: 0.68rem;
      color: var(--text-muted);
      text-align: center;
      max-width: var(--story-size);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ============================================================
       TAB BAR
    ============================================================ */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 53px;
      z-index: 90;
      background: var(--bg);
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .tab-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; }
    .tab-btn.active {
      border-bottom-color: var(--accent);
      color: var(--accent);
    }
    .tab-btn:hover { color: var(--text); }

    /* ============================================================
       GRID VIEW
    ============================================================ */
    #tab-grid, #tab-reels, #tab-tagged { display: none; }
    #tab-grid.show, #tab-reels.show, #tab-tagged.show { display: block; }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    .grid-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
    }
    .grid-item img,
    .grid-item .grid-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease, opacity 0.25s;
    }
    .grid-item:hover img,
    .grid-item:hover .grid-thumb { transform: scale(1.05); opacity: 0.8; }

    /* Video indicator */
    .grid-item-badge {
      position: absolute;
      top: 7px;
      right: 7px;
      z-index: 2;
    }
    .grid-item-badge svg {
      width: 18px;
      height: 18px;
      fill: white;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
    }

    /* Multi-image indicator */
    .multi-badge {
      position: absolute;
      top: 7px;
      right: 7px;
      z-index: 2;
    }
    .multi-badge svg { width: 18px; height: 18px; fill: white; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6)); }

    /* Hover overlay */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .grid-item:hover .grid-overlay { opacity: 1; }
    .grid-stat { display: flex; align-items: center; gap: 4px; color: #fff; font-size: 0.8rem; font-weight: 500; }
    .grid-stat svg { width: 16px; height: 16px; fill: white; }

    /* Vimeo thumbnail overlay */
    .vimeo-thumb-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }
    .vimeo-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-btn-circle {
      width: 36px;
      height: 36px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .play-btn-circle svg { width: 16px; height: 16px; fill: white; margin-left: 2px; }

    /* ============================================================
       REELS TAB
    ============================================================ */
    .reels-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3px;
    }
    .reel-item {
      position: relative;
      aspect-ratio: 9/16;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
    }
    .reel-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease;
    }
    .reel-item:hover .reel-thumb { transform: scale(1.04); }
    .reel-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    }
    .reel-client {
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .reel-caption {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.9);
      line-height: 1.35;
      margin-top: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ============================================================
       LIGHTBOX / MODAL
    ============================================================ */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0,0,0,0.96);
      flex-direction: column;
      overflow: hidden;
    }
    .lightbox.open { display: flex; }

    .lb-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .lb-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface2);
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .lb-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .lb-avatar-placeholder { font-family: var(--font-display); font-size: 0.9rem; color: var(--accent); }
    .lb-user { display: flex; flex-direction: column; gap: 1px; flex: 1; }
    .lb-username { font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .lb-client { font-size: 0.72rem; color: var(--accent); }
    .lb-close {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 4px;
    }
    .lb-close svg { width: 24px; height: 24px; stroke: currentColor; fill: none; stroke-width: 2; }

    .lb-content {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .lb-content::-webkit-scrollbar { display: none; }

    /* Image in lightbox */
    .lb-media-img {
      width: 100%;
      max-height: 60vh;
      object-fit: contain;
      display: block;
      background: #000;
    }

    /* Vimeo in lightbox */
    .lb-vimeo-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: #000;
    }
    .lb-vimeo-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Portrait (9:16) videos — fixed height, centered */
    .lb-vimeo-wrap.portrait {
      padding-bottom: 0;
      height: min(80vh, 520px);
      width: min(100%, calc(min(80vh, 520px) * 9 / 16));
      margin: 0 auto;
    }
    .lb-vimeo-wrap.portrait iframe {
      position: relative;
      width: 100%;
      height: 100%;
      display: block;
    }

    .lb-details {
      padding: 14px 16px 24px;
    }
    .lb-caption { font-size: 0.85rem; color: var(--text); line-height: 1.55; padding-top: 10px; }
    .lb-caption strong { font-weight: 500; margin-right: 6px; }
    .lb-caption-full { display: none; }
    .lb-more { color: var(--text-muted); cursor: pointer; font-size: 0.82rem; }
    .lb-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .lb-tag { font-size: 0.78rem; color: var(--accent); }
    .lb-date { font-size: 0.72rem; color: var(--text-muted); margin-top: 10px; text-transform: uppercase; letter-spacing: 0.05em; }

    /* ============================================================
       CONTACT CTA
    ============================================================ */
    .cta-bar {
      background: linear-gradient(135deg, var(--surface) 0%, rgba(201,169,110,0.08) 100%);
      border-top: 1px solid var(--border);
      padding: 20px 18px;
      text-align: center;
    }
    .cta-bar p { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 10px; line-height: 1.5; }
    .cta-bar p strong { color: var(--accent); font-weight: 500; }
    .cta-links { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .cta-link {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      color: var(--text);
      text-decoration: none;
      transition: all 0.2s;
      background: var(--surface2);
    }
    .cta-link:hover { border-color: var(--accent); color: var(--accent); }
    .cta-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ============================================================
       BOTTOM NAV
    ============================================================ */
    .bottom-nav {
      position: sticky;
      bottom: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      padding: 10px 0 max(10px, env(safe-area-inset-bottom));
      flex-shrink: 0;
    }
    .nav-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 4px 12px;
      transition: color 0.2s;
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn:hover { color: var(--text); }

    /* ============================================================
       UTILITY / ANIMATIONS
    ============================================================ */
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Scrollbar for lightbox on desktop */
    @media (min-width: 480px) {
      body { background: #050505; }
      #app { box-shadow: 0 0 60px rgba(0,0,0,0.8); }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <span class="topbar-name">surbhi<em>.</em></span>
    <div class="topbar-icons">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>
  </header>

  <!-- PROFILE HEADER -->
  <section class="profile-header">
    <div class="profile-top">
      <div class="avatar-wrap">
        <div class="avatar-ring">
          <div class="avatar-inner">
            <!-- CONFIGURABLE: Replace src with your photo URL, or remove img and keep placeholder -->
            <img id="profile-avatar-img" src="" onerror="this.style.display='none'; document.getElementById('avatar-placeholder').style.display='flex';" alt="Profile" style="display:none;" />
            <span class="avatar-placeholder" id="avatar-placeholder">SS</span>
          </div>
        </div>
      </div>
      <div class="profile-stats" id="stats-container">
        <!-- Injected by JS -->
      </div>
    </div>

    <div class="profile-bio" id="bio-container">
      <!-- Injected by JS -->
    </div>

    <div class="profile-actions">
      <button class="btn btn-primary" id="hire-btn">Hire Me</button>
      <button class="btn btn-secondary" id="collab-btn">Collab</button>
      <button class="btn-icon" title="Share">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
    </div>
  </section>

  <!-- HIGHLIGHTS -->
  <div class="highlights-section">
    <div class="highlights-scroll" id="highlights-container">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="grid">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="0.5"/><rect x="14" y="3" width="7" height="7" rx="0.5"/><rect x="3" y="14" width="7" height="7" rx="0.5"/><rect x="14" y="14" width="7" height="7" rx="0.5"/></svg>
    </button>
    <button class="tab-btn" data-tab="reels">
      <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.277A1 1 0 0121 8.682v6.636a1 1 0 01-1.447.894L15 14"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg>
    </button>
    <button class="tab-btn" data-tab="tagged">
      <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    </button>
  </div>

// ── LIGHTBOX ───────────────────────────────────────────────────

function openLightbox(id) {
  const item = PORTFOLIO.find(p => p.id === id);
  if (!item) return;

  // Media area
  let mediaHTML = '';
  if (item.type === 'vimeo') {
    const portrait = item.portrait !== false; // default portrait
    mediaHTML = `
      <div class="lb-vimeo-wrap ${portrait ? 'portrait' : ''}">
        <iframe
          src="https://player.vimeo.com/video/${item.vimeoId}?autoplay=1&title=0&byline=0&portrait=0&color=c9a96e"
          allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>`;
  } else {
    mediaHTML = `<img class="lb-media-img" src="${item.imageUrl}" alt="${item.client}" />`;
  }

  $('lb-media-area').innerHTML = mediaHTML;
  $('lb-client-name').textContent = item.client;

  // Caption
  const shortCaption = item.caption.length > 80
    ? item.caption.slice(0, 80) + '…'
    : item.caption;
  $('lb-caption-area').innerHTML = `
    <strong>${PROFILE.username}</strong>
    <span id="lb-caption-short">${shortCaption}</span>
    ${item.caption.length > 80 ? `<span class="lb-more" onclick="expandCaption()"> more</span>
    <span class="lb-caption-full" id="lb-caption-full"> ${item.caption.slice(80)}</span>` : ''}
  `;

  // Tags
  $('lb-tags-area').innerHTML = (item.tags || []).map(t => `<span class="lb-tag">${t}</span>`).join('');

  // Date
  $('lb-date').textContent = item.date;

  $('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function expandCaption() {
  const full = $('lb-caption-full');
  const short = $('lb-caption-short');
  if (full) { full.style.display = 'inline'; }
  if (short) { short.textContent = $('lb-caption-area').textContent.split('…')[0].replace(PROFILE.username, '').trim(); }
  document.querySelector('.lb-more')?.remove();
}

function closeLightbox() {
  $('lightbox').classList.remove('open');
  document.body.style.overflow = '';
  // Stop vimeo
  $('lb-media-area').innerHTML = '';
}

$('lb-close-btn').onclick = closeLightbox;
$('lightbox').onclick = e => { if (e.target === $('lightbox')) closeLightbox(); };

// Swipe to close on mobile
let touchStartY = 0;
$('lightbox').addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
$('lightbox').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 80) closeLightbox();
}, { passive: true });

// ── TABS ───────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    ['grid','reels','tagged'].forEach(t => {
      $(`tab-${t}`).classList.toggle('show', t === tab);
    });
  });
});

// ── BOTTOM NAV ─────────────────────────────────────────────────
$('contact-nav-btn').onclick = () => {
  // Switch to About tab
  document.querySelector('[data-tab="tagged"]').click();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  $('contact-nav-btn').classList.add('active');
};
$('insta-nav-btn').onclick = () => {
  window.open(PROFILE.instagram, '_blank');
};

// ── KEYBOARD ───────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── INIT ───────────────────────────────────────────────────────
buildProfile();
buildHighlights();
buildGrid();
buildReels();
buildAbout();
</script>
</body>
</html>
